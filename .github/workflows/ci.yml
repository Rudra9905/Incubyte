name: CI/CD Pipeline

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  backend-test:
    name: Backend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'maven'

      - name: Build and Run Tests
        working-directory: ./Backend
        run: |
          mvn clean test

      - name: Generate JaCoCo Coverage Report Summary
        run: |
          python .github/scripts/parse_jacoco.py

      - name: Upload JaCoCo Coverage Report Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: Backend/target/site/jacoco/

  frontend-test:
    name: Frontend Build & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ./Frontend/package-lock.json

      - name: Install Dependencies
        working-directory: ./Frontend
        run: |
          npm ci

      - name: Run Tests
        working-directory: ./Frontend
        run: |
          npm run test
